<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Опыт Юнга</title>
    <style>
        body { 
            font-family: -apple-system, sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            background: #121212; /* Глубокий черный для контраста волн */
            color: white; 
            margin: 0; 
            padding: 10px; 
            touch-action: manipulation; 
        }
        .container {
            width: 100%;
            max-width: 450px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        canvas { 
            background: #000; 
            border-radius: 12px; 
            width: 100%; 
            height: auto;
            box-shadow: 0 0 20px rgba(0, 255, 204, 0.1);
        }
        .ui { 
            margin-top: 15px; 
            background: #252525; 
            padding: 20px; 
            border-radius: 16px; 
            display: flex;
            flex-direction: column;
            gap: 15px; 
            width: 90%; 
        }
        .row { 
            display: flex; 
            flex-direction: column;
            gap: 8px;
            font-size: 14px; 
        }
        .label-group {
            display: flex;
            justify-content: space-between;
        }
        input[type=range] { 
            width: 100%; 
            height: 30px; /* Удобно для пальца */
            cursor: pointer;
        }
        b { color: #00ffcc; font-size: 16px; }
        .hint {
            font-size: 12px;
            color: #888;
            text-align: center;
            margin-top: 5px;
        }
    </style>
</head>
<body>

    <div class="container">
        <canvas id="yCanvas" width="450" height="550"></canvas>

        <div class="ui">
            <div class="row">
                <div class="label-group">
                    <span>Длина волны (λ):</span>
                    <b id="vL">30</b>
                </div>
                <input type="range" id="waveL" min="15" max="60" value="30">
            </div>
            
            <div class="row">
                <div class="label-group">
                    <span>Расстояние между щелями (d):</span>
                    <b id="vD">40</b>
                </div>
                <input type="range" id="dist" min="15" max="100" value="40">
            </div>
            
            <div class="hint">
                Чем меньше <b>d</b> и больше <b>λ</b>, тем шире интерференционные полосы.
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('yCanvas');
        const ctx = canvas.getContext('2d');

        function draw() {
            const lambda = +document.getElementById('waveL').value;
            const d = +document.getElementById('dist').value;
            document.getElementById('vL').innerText = lambda;
            document.getElementById('vD').innerText = d;

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            const screenY = 320; 
            const sourceY = 60;  
            const centerX = canvas.width / 2;

            // 1. Рисуем экран с щелями
            const s1x = centerX - d / 2;
            const s2x = centerX + d / 2;

            ctx.strokeStyle = "#444";
            ctx.lineWidth = 4;
            ctx.beginPath();
            ctx.moveTo(0, sourceY); ctx.lineTo(s1x - 5, sourceY);
            ctx.moveTo(s1x + 5, sourceY); ctx.lineTo(s2x - 5, sourceY);
            ctx.moveTo(s2x + 5, sourceY); ctx.lineTo(canvas.width, sourceY);
            ctx.stroke();
            
            ctx.fillStyle = "#00ffcc";
            ctx.font = "bold 14px Arial";
            ctx.fillText("S1", s1x - 8, sourceY - 15);
            ctx.fillText("S2", s2x - 8, sourceY - 15);

            // 2. Генерация интерференционной картины (настоящие пиксели)
            const stripeHeight = 60;
            const imgData = ctx.createImageData(canvas.width, stripeHeight);
            
            for (let x = 0; x < canvas.width; x++) {
                let distToCenter = x - centerX;
                // Разность хода: Δ = d * sin(θ) ≈ d * (x/L)
                let pathDiff = (d * distToCenter) / (screenY - sourceY);
                // Интенсивность I = cos²(π * Δ / λ)
                let intensity = Math.pow(Math.cos(Math.PI * pathDiff / lambda), 2);
                
                let val = intensity * 255;
                for (let y = 0; y < stripeHeight; y++) {
                    let idx = (x + y * canvas.width) * 4;
                    imgData.data[idx] = 0;           // R
                    imgData.data[idx + 1] = val;     // G
                    imgData.data[idx + 2] = val * 0.7; // B (бирюзовый оттенок)
                    imgData.data[idx + 3] = 255;     // Alpha
                }
            }
            ctx.putImageData(imgData, 0, screenY);

            // 3. График интенсивности
            ctx.strokeStyle = "#00ffcc";
            ctx.lineWidth = 2;
            ctx.beginPath();
            for (let x = 0; x < canvas.width; x++) {
                let distToCenter = x - centerX;
                let pathDiff = (d * distToCenter) / (screenY - sourceY);
                let intensity = Math.pow(Math.cos(Math.PI * pathDiff / lambda), 2);
                
                let graphY = (screenY + 160) - intensity * 80;
                if (x === 0) ctx.moveTo(x, graphY);
                else ctx.lineTo(x, graphY);
            }
            ctx.stroke();

            // 4. Схематичные волны (анимированные)
            const time = Date.now() * 0.005;
            ctx.globalAlpha = 0.15;
            ctx.setLineDash([2, 4]);
            for (let r = (time % lambda); r < 280; r += lambda) {
                ctx.beginPath(); ctx.arc(s1x, sourceY, r, 0, Math.PI); ctx.stroke();
                ctx.beginPath(); ctx.arc(s2x, sourceY, r, 0, Math.PI); ctx.stroke();
            }
            ctx.setLineDash([]);
            ctx.globalAlpha = 1.0;

            // Подписи
            ctx.fillStyle = "#aaa";
            ctx.font = "12px Arial";
            ctx.fillText("ЭКРАН НАБЛЮДЕНИЯ", 10, screenY - 15);
            ctx.fillText("РАСПРЕДЕЛЕНИЕ ЭНЕРГИИ (I)", 10, screenY + 190);

            requestAnimationFrame(draw);
        }

        draw();
    </script>
</body>
</html>
