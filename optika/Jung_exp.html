<!DOCTYPE html>
<html>
<head>
    <title>Эксперимент Юнга</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; background: #1a1a1a; color: white; margin: 0; padding: 10px; }
        canvas { background: black; border: 1px solid #444; border-radius: 8px; cursor: crosshair; }
        .ui { margin-top: 15px; background: #333; padding: 15px; border-radius: 12px; display: grid; gap: 10px; width: 400px; }
        .row { display: flex; justify-content: space-between; align-items: center; font-size: 13px; }
        input[type=range] { width: 180px; }
        b { color: #00ffcc; }
    </style>
</head>
<body>

    <canvas id="yCanvas" width="450" height="500"></canvas>

    <div class="ui">
        <div class="row">Длина волны (λ): <input type="range" id="waveL" min="10" max="60" value="30"> <b id="vL">30</b></div>
        <div class="row">Расстояние щелей (d): <input type="range" id="dist" min="10" max="100" value="40"> <b id="vD">40</b></div>
        <div style="font-size: 11px; color: #aaa; text-align: center; margin-top: 5px;">
            Меняйте параметры, чтобы увидеть изменение интерференционной картины
        </div>
    </div>

    <script>
        const canvas = document.getElementById('yCanvas');
        const ctx = canvas.getContext('2d');

        function draw() {
            const lambda = +document.getElementById('waveL').value;
            const d = +document.getElementById('dist').value;
            document.getElementById('vL').innerText = lambda;
            document.getElementById('vD').innerText = d;

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            const screenY = 350; // Положение экрана
            const sourceY = 50;  // Положение щелей
            const centerX = canvas.width / 2;

            // 1. Рисуем щели (S1 и S2)
            const s1x = centerX - d / 2;
            const s2x = centerX + d / 2;

            ctx.fillStyle = "white";
            ctx.fillRect(0, sourceY - 2, canvas.width, 4); // Непрозрачный экран
            ctx.clearRect(s1x - 2, sourceY - 5, 4, 10);    // Щель 1
            ctx.clearRect(s2x - 2, sourceY - 5, 4, 10);    // Щель 2
            
            ctx.fillStyle = "#00ffcc";
            ctx.fillText("S1", s1x - 5, sourceY - 15);
            ctx.fillText("S2", s2x - 5, sourceY - 15);

            // 2. Расчет интерференции на нижнем экране
            // Формула интенсивности: I = I0 * cos²(pi * d * sin(theta) / lambda)
            // При малых углах sin(theta) ≈ x / L
            
            const imgData = ctx.createImageData(canvas.width, 50);
            for (let x = 0; x < canvas.width; x++) {
                let distToCenter = x - centerX;
                let pathDiff = (d * distToCenter) / (screenY - sourceY);
                let intensity = Math.pow(Math.cos(Math.PI * pathDiff / lambda), 2);
                
                let val = intensity * 255;
                let idx = x * 4;
                imgData.data[idx] = 0;           // R
                imgData.data[idx + 1] = val;     // G
                imgData.data[idx + 2] = val * 0.8; // B
                imgData.data[idx + 3] = 255;     // A
            }
            ctx.putImageData(imgData, 0, screenY);

            // 3. Рисуем график интенсивности
            ctx.strokeStyle = "#00ffcc";
            ctx.lineWidth = 1.5;
            ctx.beginPath();
            for (let x = 0; x < canvas.width; x++) {
                let distToCenter = x - centerX;
                let pathDiff = (d * distToCenter) / (screenY - sourceY);
                let intensity = Math.pow(Math.cos(Math.PI * pathDiff / lambda), 2);
                
                let y = (screenY + 120) - intensity * 60;
                if (x === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            }
            ctx.stroke();

            // 4. Схематичные волны (декоративно)
            ctx.globalAlpha = 0.2;
            ctx.setLineDash([5, 10]);
            for (let r = 20; r < 300; r += lambda) {
                ctx.beginPath(); ctx.arc(s1x, sourceY, r, 0, Math.PI); ctx.stroke();
                ctx.beginPath(); ctx.arc(s2x, sourceY, r, 0, Math.PI); ctx.stroke();
            }
            ctx.setLineDash([]);
            ctx.globalAlpha = 1.0;

            ctx.fillStyle = "white";
            ctx.fillText("Интерференционная картина на экране", 10, screenY - 10);
            ctx.fillText("График интенсивности (I)", 10, screenY + 140);

            requestAnimationFrame(draw);
        }

        draw();
    </script>
</body>
</html>
