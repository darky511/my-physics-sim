<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Влажность воздуха</title>
    <!-- Подключаем шрифт Inter -->
    <link href="https://fonts.googleapis.com" rel="stylesheet">
    <style>
        :root {
            --accent: #2563EB;
            --text-main: #1E293B;
            --text-sub: #64748B;
            --formula-color: #475569;
            --track-bg: #E2E8F0;
        }

        body {
            margin: 0;
            height: 100vh;
            /* Фон: Линейный градиент по ТЗ */
            background: linear-gradient(180deg, #E8EFCF 0%, #F2F5F9 100%);
            font-family: 'Inter', sans-serif;
            color: var(--text-main);
            display: flex;
            overflow: hidden;
        }

        /* Боковая панель Glassmorphism */
        #sidebar {
            width: 320px;
            height: calc(100vh - 40px);
            margin: 20px;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 24px;
            padding: 24px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            gap: 20px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05);
            z-index: 10;
        }

        .formula {
            font-family: 'Inter', sans-serif;
            font-weight: 300;
            font-size: 24px;
            color: var(--formula-color);
            text-align: center;
            letter-spacing: 0.05em;
            margin-bottom: 10px;
        }

        .control-group { display: flex; flex-direction: column; gap: 8px; }
        
        .label-row { display: flex; justify-content: space-between; align-items: baseline; }
        .label { font-size: 11px; font-weight: 700; color: var(--text-sub); text-transform: uppercase; letter-spacing: 0.05em; }
        .cur-val { font-size: 15px; font-weight: 700; color: var(--text-main); }

        /* Стилизация слайдеров по ТЗ */
        input[type=range] { -webkit-appearance: none; width: 100%; background: transparent; outline: none; }
        
        /* Дорожка */
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%; height: 4px; background: var(--track-bg); border-radius: 2px;
        }
        
        /* Ползунок */
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 18px; width: 18px;
            background: #ffffff;
            border: 2px solid var(--accent);
            border-radius: 50%;
            margin-top: -7px;
            cursor: pointer;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            transition: transform 0.2s ease, border-color 0.2s ease;
        }
        input[type=range]::-webkit-slider-thumb:hover { transform: scale(1.1); }

        /* Информационные карточки */
        .results { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: auto; }
        .res-item {
            background: rgba(255, 255, 255, 0.5);
            padding: 16px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.4);
        }
        .res-label { font-size: 9px; color: var(--text-sub); text-transform: uppercase; font-weight: 700; margin-bottom: 4px; display: block; }
        .res-num { font-size: 18px; font-weight: 700; color: var(--text-main); }
        .full-width { grid-column: span 2; }

        #viewport { flex-grow: 1; height: 100vh; position: relative; cursor: ns-resize; }
        canvas { display: block; }
    </style>
</head>
<body>

<div id="sidebar">
    <div class="formula">PV = νRT</div>
    
    <div class="control-group">
        <div class="label-row"><span class="label">Температура (T)</span><span id="t-cur" class="cur-val">20°C</span></div>
        <input type="range" id="t-range" min="0" max="100" value="20">
    </div>

    <div class="control-group">
        <div class="label-row"><span class="label">Вещество (ν)</span><span id="n-cur" class="cur-val">1 ммоль</span></div>
        <input type="range" id="n-range" min="1" max="100" value="1">
    </div>

    <div class="control-group">
        <div class="label-row"><span class="label">Емкость (V₀)</span><span id="v0-cur" class="cur-val">10.0 л</span></div>
        <input type="range" id="v0-range" min="1" max="10" value="10" step="0.1">
    </div>

    <div class="results">
        <div class="res-item full-width"><span class="res-label">P Насыщенного пара</span><div class="res-num" id="psat-res">2.34 <small>кПа</small></div></div>
        <div class="res-item"><span class="res-label">Давление P</span><div class="res-num" id="p-res">0.00</div></div>
        <div class="res-item"><span class="res-label">Влажность φ</span><div class="res-num" id="h-res">0%</div></div>
        <div class="res-item full-width"><span class="res-label">Объем газа V</span><div class="res-num" id="v-res">10.00 <small>л</small></div></div>
    </div>
</div>

<div id="viewport">
    <canvas id="sim"></canvas>
</div>

<script>
    const canvas = document.getElementById('sim');
    const ctx = canvas.getContext('2d');
    
    const SAT_TABLE = { 
    0: 0.611, 1: 0.656, 2: 0.705, 3: 0.757, 4: 0.813, 
    5: 0.872, 6: 0.934, 7: 1.01, 8: 1.07, 9: 1.15, 
    10: 1.23, 11: 1.31, 12: 1.40, 13: 1.50, 14: 1.59, 
    15: 1.70, 16: 1.81, 17: 1.94, 18: 2.06, 19: 2.19, 
    20: 2.34, 21: 2.48, 22: 2.64, 23: 2.81, 24: 2.99, 
    25: 3.17, 
    // Далее идут значения из таблицы десятками
    30: 4.24, 40: 7.37, 50: 12.3, 60: 19.9, 70: 31.0, 80: 47.3, 90: 70.1, 100: 101.3 };

    function getPsat(tc) {
        const keys = Object.keys(SAT_TABLE).map(Number).sort((a,b)=>a-b);
        if (SAT_TABLE[tc] !== undefined) return SAT_TABLE[tc];
        for (let i=0; i<keys.length-1; i++) {
            if (tc > keys[i] && tc < keys[i+1]) {
                const t0=keys[i], t1=keys[i+1], p0=SAT_TABLE[t0], p1=SAT_TABLE[t1];
                return p0 + (p1-p0)*(tc-t0)/(t1-t0);
            }
        }
        return SAT_TABLE[tc > 50 ? 100 : 0];
    }

    const tIn = document.getElementById('t-range'), nIn = document.getElementById('n-range'), v0In = document.getElementById('v0-range');
    const pRes = document.getElementById('p-res'), hRes = document.getElementById('h-res'), vRes = document.getElementById('v-res'), psatRes = document.getElementById('psat-res');
    
    let w, h, isDragging = false, pistonLevel = 0.05; 
    let particles = [];
    const R = 8.314;
    const WATER_VISUAL_FACTOR = 0.05; 

    function initParticles() {
        particles = [];
        for(let i=0; i<300; i++) {
            particles.push({ 
                x: Math.random(), 
                y: Math.random(), 
                s: Math.random() * 2 + 2, // Размер от 2px до 4px по ТЗ
                op: Math.random() * 0.5 + 0.4, // Opacity 0.4 - 0.9 по ТЗ
                vx: (Math.random()-0.5)*0.002, 
                vy: (Math.random()-0.5)*0.002 
            });
        }
    }

    const getEvY = (e) => e.touches ? e.touches.clientY : e.clientY;
    window.addEventListener('mousedown', (e) => { if(e.clientX > 320) isDragging = true; });
    window.addEventListener('touchstart', (e) => { if(e.touches && e.touches[0].clientX > 320) isDragging = true; });
    window.addEventListener('mouseup', () => isDragging = false);
    window.addEventListener('mousemove', (e) => { if (isDragging) pistonLevel = Math.max(0, Math.min(0.99, (getEvY(e) - (h*0.15))/(h*0.7))); });

    function render() {
        ctx.clearRect(0, 0, w, h);
        
        const Tc = parseFloat(tIn.value), T = Tc + 273.15, V0 = parseFloat(v0In.value);
        let nMmol = parseFloat(nIn.value);

        // Лимит вещества
        const nMax = Math.floor(V0 / WATER_VISUAL_FACTOR);
        if (nMmol > nMax) { nMmol = nMax; nIn.value = nMax; }
        const nTot = nMmol / 1000;

        const cylW = 260, cylH = h * 0.7, sX = w/2 - cylW/2, sY = h * 0.15;
        const Psat = getPsat(Tc);

        // Математика
        const totalSpaceV = V0 * (1 - pistonLevel);
        let P = (nTot * R * T) / (totalSpaceV * 0.001 + 1e-10) / 1000;
        let phi = (P / Psat) * 100;
        let nLiq = 0;

        if (phi >= 100) {
            phi = 100; P = Psat;
            const nGasMax = (Psat * 1000 * totalSpaceV * 0.001) / (R * T);
            nLiq = Math.max(0, nTot - nGasMax);
        }

        const liqVolL = (nLiq * 1000) * WATER_VISUAL_FACTOR;
        const liqH = (liqVolL / V0) * cylH;
        
        // Стопор поршня
        const minPos = 1 - (liqVolL / V0) - 0.01;
        if (pistonLevel > minPos) pistonLevel = minPos;

        const pY = sY + (pistonLevel * cylH);
        const gasH = Math.max(0, (sY + cylH) - pY - liqH);

        // Обновление UI
        document.getElementById('t-cur').innerText = Tc + "°C";
        document.getElementById('n-cur').innerText = nMmol + " ммоль";
        document.getElementById('v0-cur').innerText = V0.toFixed(1) + " л";
        psatRes.innerHTML = Psat.toFixed(2) + " <small>кПа</small>";
        pRes.innerText = P.toFixed(2);
        hRes.innerText = Math.floor(phi) + "%";
        vRes.innerHTML = Math.max(0, (gasH/cylH)*V0).toFixed(2) + " <small>л</small>";

        // 1. Стенки колбы (Тонкие 1-2px по ТЗ)
        ctx.strokeStyle = 'rgba(100, 116, 139, 0.3)';
        ctx.lineWidth = 1.5;
        ctx.strokeRect(sX, sY, cylW, cylH);

        // 2. Жидкость (с эффектом Inner Glow по ТЗ)
        if (liqH > 1) {
            ctx.fillStyle = '#2563EB';
            ctx.fillRect(sX, sY + cylH - liqH, cylW, liqH);
            
            // Внутреннее свечение на стыке
            const glow = ctx.createLinearGradient(0, sY + cylH - liqH, 0, sY + cylH - liqH + 5);
            glow.addColorStop(0, 'rgba(147, 197, 253, 0.8)');
            glow.addColorStop(1, 'rgba(37, 99, 235, 0)');
            ctx.fillStyle = glow;
            ctx.fillRect(sX, sY + cylH - liqH, cylW, 5);
        }

        // 3. Туман (густота)
        const fogOp = Math.pow(phi/100, 3) * 0.4;
        ctx.fillStyle = `rgba(37, 99, 235, ${fogOp})`;
        ctx.fillRect(sX, pY, cylW, gasH);

        // 4. Газ (рандомизированные частицы по ТЗ)
        const drawCount = Math.min(particles.length, (nTot*1000 - nLiq*1000)*50);
        for(let i=0; i < drawCount; i++) {
            let p = particles[i];
            p.x += p.vx; p.y += p.vy;
            if(p.x < 0 || p.x > 1) p.vx *= -1;
            if(p.y < 0 || p.y > 1) p.vy *= -1;
            ctx.globalAlpha = p.op;
            ctx.fillStyle = '#2563EB';
            ctx.beginPath();
            ctx.arc(sX + p.x*cylW, pY + p.y*gasH, p.s/2, 0, Math.PI*2);
            ctx.fill();
        }
        ctx.globalAlpha = 1.0;

        // 5. Поршень (Металлический градиент по ТЗ)
        const pGrad = ctx.createLinearGradient(sX, 0, sX + cylW, 0);
        pGrad.addColorStop(0, '#94A3B8');
        pGrad.addColorStop(0.5, '#CBD5E1');
        pGrad.addColorStop(1, '#64748B');
        
        ctx.fillStyle = pGrad;
        ctx.fillRect(sX - 2, pY, cylW + 4, 20);
        
        // Блик (тонкая белая линия)
        ctx.strokeStyle = 'rgba(255, 255, 255, 0.8)';
        ctx.lineWidth = 1;
        ctx.beginPath(); ctx.moveTo(sX, pY + 2); ctx.lineTo(sX + cylW, pY + 2); ctx.stroke();
        
        // Шток (ручка)
        ctx.fillStyle = '#CBD5E1';
        ctx.fillRect(w/2 - 3, 0, 6, pY);

        requestAnimationFrame(render);
    }

    function onRes() { 
        w = canvas.width = window.innerWidth - 360; 
        h = canvas.height = window.innerHeight; 
    }
    window.addEventListener('resize', onRes);
    onRes(); initParticles(); render();
</script>
</body>
</html>
