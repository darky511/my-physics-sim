<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Физика: Мячик</title>
    <style>
        body { margin: 0; background: #f0f0f0; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; }
        canvas { background: white; box-shadow: 0 5px 15px rgba(0,0,0,0.2); touch-action: none; max-width: 95%; height: auto; border-radius: 8px; }
        .controls { margin-bottom: 15px; color: #333; font-weight: bold; }
    </style>
</head>
<body>
    <div class="controls">Нажми на экран, чтобы подбросить!</div>
    <canvas id="simCanvas"></canvas>

    <script>
        const canvas = document.getElementById('simCanvas');
        const ctx = canvas.getContext('2d');

        canvas.width = 400;
        canvas.height = 500;

        let y = 50;
        let velocity = 0;
        const gravity = 0.6;
        const bounce = -0.7;
        const radius = 25;

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Мяч с небольшим градиентом для красоты
            ctx.beginPath();
            ctx.arc(canvas.width / 2, y, radius, 0, Math.PI * 2);
            ctx.fillStyle = "#007bff";
            ctx.fill();
            ctx.closePath();

            velocity += gravity;
            y += velocity;

            if (y + radius > canvas.height) {
                y = canvas.height - radius;
                velocity *= bounce;
                if (Math.abs(velocity) < 1) velocity = 0; // Остановка дрожания
            }

            requestAnimationFrame(draw);
        }

        // Работает везде: и мышка, и палец
        canvas.addEventListener('pointerdown', (e) => {
            velocity = -15;
        });

        draw();
    </script>
</body>
</html>
