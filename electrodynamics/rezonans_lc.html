<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>RLC Resonance Lab</title>
    <style>
        :root { --gold: #D4AF37; --blue: #3A86FF; --bg: #050505; --panel: #111; }
        body { margin: 0; background: var(--bg); color: #f0f0f0; font-family: 'Segoe UI', sans-serif; display: flex; height: 100vh; overflow: hidden; }
        #canvas-container { flex: 1; position: relative; }
        canvas { width: 100%; height: 100%; display: block; }
        .ui-panel { 
            width: 320px; background: var(--panel); border-left: 2px solid #333; 
            padding: 25px; box-sizing: border-box; display: flex; flex-direction: column; gap: 12px;
        }
        .control { display: flex; flex-direction: column; gap: 4px; }
        label { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 1.2px; color: #888; }
        input[type=range] { width: 100%; accent-color: var(--gold); cursor: pointer; }
        .value { color: var(--gold); font-weight: bold; float: right; font-family: monospace; font-size: 1rem; }
        .stats { margin-top: 5px; padding: 12px; background: #000; border: 1px solid #444; border-radius: 8px; font-family: monospace; }
        #res-label { text-align: center; color: var(--gold); font-weight: 900; letter-spacing: 4px; margin-top: 8px; font-size: 1.1rem; text-shadow: 0 0 10px var(--gold); }
        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 5px; }
        button { padding: 10px; border: 1px solid var(--gold); background: transparent; color: var(--gold); cursor: pointer; border-radius: 6px; font-weight: bold; font-size: 0.8rem; }
        button.active { background: var(--gold); color: black; }
    </style>
</head>
<body>

<div id="canvas-container">
    <canvas id="sim"></canvas>
</div>

<div class="ui-panel">
    <h3 style="color:var(--gold); margin:0; letter-spacing:2px; font-size:1.1rem">RLC RESONANCE 2.6</h3>
    <div class="btn-group">
        <button id="startBtn" class="active">ПУСК</button>
        <button id="stopBtn">СТОП</button>
    </div>
    <div class="control">
        <label>Индуктивность L <span id="vl" class="value">1.0</span></label>
        <input type="range" id="l" min="0.1" max="10" step="0.1" value="1.0">
    </div>
    <div class="control">
        <label>Емкость C <span id="vc" class="value">1.0</span></label>
        <input type="range" id="c" min="0.1" max="10" step="0.1" value="1.0">
    </div>
    <div class="control">
        <label>Сопротивление R <span id="vr" class="value">0.3</span></label>
        <input type="range" id="r" min="0.0" max="2" step="0.05" value="0.3">
    </div>
    <div class="control">
        <label>Частота источника ω <span id="vw" class="value">1.0</span></label>
        <input type="range" id="w" min="0.1" max="10" step="0.1" value="1.0">
    </div>
    <div class="stats">
        <div style="display:flex; justify-content:space-between; font-size:0.8rem"><span>ω (ИСТ):</span><span id="stat-w">1.00</span></div>
        <div style="display:flex; justify-content:space-between; font-size:0.8rem"><span>ω₀ (КОНТ):</span><span id="stat-w0">1.00</span></div>
        <div id="res-label" style="opacity:0.1">РЕЗОНАНС</div>
    </div>
</div>

<script>
const canvas = document.getElementById('sim');
const ctx = canvas.getContext('2d');
let isRunning = true;
const COLOR_GOLD = "#D4AF37";
const COLOR_BLUE = "#3A86FF";

const p = { w: 1, l: 1, c: 1, r: 0.3, t: 0, electrons: [] };
for(let i=0; i<80; i++) p.electrons.push(Math.random());

document.getElementById('startBtn').onclick = () => { isRunning = true; updateBtns(); };
document.getElementById('stopBtn').onclick = () => { isRunning = false; updateBtns(); };
function updateBtns() {
    document.getElementById('startBtn').className = isRunning ? 'active' : '';
    document.getElementById('stopBtn').className = !isRunning ? 'active' : '';
}
['l','c','r','w'].forEach(k => {
    document.getElementById(k).oninput = (e) => {
        p[k] = parseFloat(e.target.value);
        document.getElementById('v'+k).innerText = p[k].toFixed(1);
    };
});

function resize() {
    canvas.width = canvas.clientWidth;
    canvas.height = canvas.clientHeight;
}
window.onresize = resize;
resize();

function getPos(pct, cx, cy) {
    const S = 320, R = 60, side = S - 2*R, arc = Math.PI * R / 2, total = 4 * side + 4 * arc;
    let d = pct * total;
    if (d < side) return { x: cx - side/2 + d, y: cy - S/2 }; d -= side;
    if (d < arc) { let a = (d/arc)*Math.PI/2 - Math.PI/2; return { x: cx + side/2 + Math.cos(a)*R, y: cy - side/2 + Math.sin(a)*R }; } d -= arc;
    if (d < side) return { x: cx + S/2, y: cy - side/2 + d }; d -= side;
    if (d < arc) { let a = (d/arc)*Math.PI/2; return { x: cx + side/2 + Math.cos(a)*R, y: cy + side/2 + Math.sin(a)*R }; } d -= arc;
    if (d < side) return { x: cx + side/2 - d, y: cy + S/2 }; d -= side;
    if (d < arc) { let a = (d/arc)*Math.PI/2 + Math.PI/2; return { x: cx - side/2 + Math.cos(a)*R, y: cy + side/2 + Math.sin(a)*R }; } d -= arc;
    if (d < side) return { x: cx - S/2, y: cy + side/2 - d }; d -= side;
    let a = (d/arc)*Math.PI/2 + Math.PI; return { x: cx - side/2 + Math.cos(a)*R, y: cy - side/2 + Math.sin(a)*R };
}

function draw() {
    if (isRunning) p.t += 0.02;
    const w0 = 1/Math.sqrt(p.l*p.c);
    const XL = p.w * p.l, XC = 1/(p.w * p.c);
    const Z = Math.sqrt((p.r + 0.001)**2 + (XL - XC)**2);
    const I0 = 50 / Z;
    const resFactor = Math.pow(1 / (1 + Math.abs(p.w - w0)*2.5), 2);
    
    // ЛИМИТЕР ТОКА ДЛЯ ЭЛЕКТРОНОВ (чтобы не вылетали)
    const limitedI = Math.min(I0, 500); 
    const currentI = Math.sin(p.t * p.w) * limitedI;
    
    document.getElementById('stat-w').innerText = p.w.toFixed(2);
    document.getElementById('stat-w0').innerText = w0.toFixed(2);
    document.getElementById('res-label').style.opacity = resFactor > 0.85 ? "1" : "0.1";

    ctx.fillStyle = '#050505';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    const cx = canvas.width * 0.38, cy = canvas.height / 2 - 120, S = 320;

    // 1. ЦЕПЬ
    ctx.strokeStyle = '#222'; ctx.lineWidth = 14;
    ctx.beginPath(); ctx.roundRect(cx - S/2, cy - S/2, S, S, 60); ctx.stroke();

    // Электроны (строго по путям)
    p.electrons.forEach((pos, i) => {
        if (isRunning) {
            // Применяем нормализованный шаг
            p.electrons[i] = (pos + currentI * 0.0004 + 1) % 1;
        }
        const pt = getPos(p.electrons[i], cx, cy);
        ctx.fillStyle = resFactor > 0.85 ? '#FFF' : COLOR_BLUE;
        if(resFactor > 0.85) { ctx.shadowBlur = 8; ctx.shadowColor = "#FFF"; }
        ctx.beginPath(); ctx.arc(pt.x, pt.y, 5, 0, Math.PI*2); ctx.fill();
        ctx.shadowBlur = 0;
    });

    // Компоненты (L, C, R, ИСТ)
    ctx.fillStyle = '#050505';
    // L (Верх)
    ctx.fillRect(cx-60, cy-S/2-25, 120, 50);
    ctx.strokeStyle = COLOR_GOLD; ctx.lineWidth = 4;
    ctx.beginPath(); for(let i=0; i<5; i++) ctx.arc(cx-40+i*20, cy-S/2, 14, 0, Math.PI*2); ctx.stroke();
    // C (Право)
    const gap = 25 - (p.c / 10) * 21;
    ctx.fillRect(cx+S/2-30, cy-50, 60, 100);
    ctx.strokeStyle = COLOR_BLUE; ctx.lineWidth = 8;
    ctx.beginPath(); 
    ctx.moveTo(cx+S/2 - gap/2, cy-40); ctx.lineTo(cx+S/2 - gap/2, cy+40);
    ctx.moveTo(cx+S/2 + gap/2, cy-40); ctx.lineTo(cx+S/2 + gap/2, cy+40); ctx.stroke();
    // R (Низ)
    ctx.fillRect(cx-50, cy+S/2-25, 100, 50);
    ctx.strokeStyle = '#FF4444'; ctx.lineWidth = 4; ctx.strokeRect(cx-40, cy+S/2-15, 80, 30);
    // ИСТ (Лево)
    ctx.beginPath(); ctx.arc(cx-S/2, cy, 35, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = '#FFF'; ctx.stroke();
    ctx.beginPath(); for(let x=-20; x<=20; x++) ctx.lineTo(cx-S/2+x, cy+Math.sin(x*0.15 + p.t*5)*12); ctx.stroke();

    // 2. РАДИО
    const rx = canvas.width * 0.8, ry = cy, rw = 180, rh = 300;
    ctx.fillStyle = '#151515'; ctx.beginPath(); ctx.roundRect(rx-rw/2, ry-rh/2, rw, rh, 20); ctx.fill();
    ctx.strokeStyle = '#333'; ctx.lineWidth = 4; ctx.stroke();
    ctx.fillStyle = '#000'; ctx.fillRect(rx-70, ry-125, 140, 170);
    // Шкала делений
    for(let i=0; i<=100; i++) {
        const y = ry - 125 + (i/100)*170;
        const major = i % 10 === 0;
        ctx.strokeStyle = major ? '#666' : '#333'; ctx.beginPath();
        ctx.moveTo(rx-70, y); ctx.lineTo(rx - 70 + (major?25:12), y); ctx.stroke();
    }
    const targetY = ry - 125 + (w0/10)*170;
    ctx.strokeStyle = 'rgba(212,175,55,0.4)'; ctx.lineWidth = 10;
    ctx.beginPath(); ctx.moveTo(rx-70, targetY); ctx.lineTo(rx+70, targetY); ctx.stroke();
    const pointerY = ry - 125 + (p.w/10)*170;
    ctx.strokeStyle = resFactor > 0.85 ? '#FFF' : '#FF3333'; ctx.lineWidth = 4;
    ctx.beginPath(); ctx.moveTo(rx-85, pointerY); ctx.lineTo(rx+55, pointerY); ctx.stroke();

    // 3. ГРАФИК (ОСЦИЛЛОГРАФ)
    const gy = canvas.height - 110;
    const viewScale = Math.min(1.0, 90 / (I0 + 1));
    const finalAmp = I0 * viewScale * 1.8;
    ctx.beginPath(); ctx.lineWidth = resFactor > 0.85 ? 6 : 3;
    ctx.strokeStyle = resFactor > 0.85 ? COLOR_GOLD : '#222';
    if(resFactor > 0.85) { ctx.shadowBlur = 15; ctx.shadowColor = COLOR_GOLD; }
    for(let x=0; x < canvas.width; x++) {
        const ang = (x - canvas.width/2)*0.02*p.w + p.t*p.w;
        ctx.lineTo(x, gy + Math.sin(ang) * finalAmp);
    }
    ctx.stroke(); ctx.shadowBlur = 0;
    // Маркер на графике
    ctx.fillStyle = '#FFF'; ctx.beginPath(); ctx.arc(canvas.width/2, gy + Math.sin(p.t*p.w)*finalAmp, 6, 0, Math.PI*2); ctx.fill();

    requestAnimationFrame(draw);
}
draw();
</script>
</body>
</html>
